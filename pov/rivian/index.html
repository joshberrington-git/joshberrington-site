<style>
  :root { --ink:#17170F; --bone:#E7E3D8; --faint:#8F8C79; --yellow:#FFB100; --line:rgba(231,227,216,0.2); }

  form { display:flex; gap:0.6rem; }
  input {
    flex:1; background:rgba(231,227,216,0.06); border:1px solid var(--line); border-radius:10px;
    color:var(--bone); font-size:1rem; padding:0.75rem 1rem; outline:none;
  }
  input:focus { border-color:var(--yellow); }
  button {
    background:var(--yellow); color:#17170F; border:none; border-radius:10px;
    font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:0.78rem; font-weight:600;
    letter-spacing:0.08em; text-transform:uppercase; padding:0.75rem 1.2rem; cursor:pointer;
  }
  button:hover { filter:brightness(1.06); }
  button:focus-visible { outline:2px solid var(--bone); outline-offset:2px; }
  .err { color:#E28F55; font-size:0.85rem; margin-top:0.9rem; min-height:1.2em; }
  .busy { opacity:0.6; pointer-events:none; }
</style>

var ITER = 600000;
function b64bytes(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
document.getElementById('f').addEventListener('submit', function(ev){
  ev.preventDefault();
  var err=document.getElementById('err'), gate=document.querySelector('.gate');
  err.textContent=''; gate.classList.add('busy');
  var pw=document.getElementById('pw').value;
  (async function(){
    try{
      var data=b64bytes(PAYLOAD_B64);
      if(String.fromCharCode.apply(null,Array.from(data.slice(0,8)))!=='Salted__') throw new Error('bad payload');
      var salt=data.slice(8,16), ct=data.slice(16);
      var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
      var bits=new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'},km,384));
      var key=await crypto.subtle.importKey('raw',bits.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:bits.slice(32,48)},key,ct);
      var html=new TextDecoder().decode(pt);
      if(html.slice(0,9).toLowerCase()!=='<!doctype') throw new Error('wrong');
      document.open(); document.write(html); document.close();
    }catch(e){
      gate.classList.remove('busy');
      err.textContent='That password didn\u2019t work. Check it and try again.';
    }
  })();
});
